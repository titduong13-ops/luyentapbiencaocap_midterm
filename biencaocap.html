<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 Biên Dịch Cao Cấp — Ôn Thi 8 Buổi</title>
<style>
:root {
  --blue:#2563eb; --blue-light:#dbeafe; --blue-dark:#1e3a5f;
  --purple:#7c3aed; --purple-light:#ede9fe;
  --green:#059669; --green-light:#d1fae5;
  --orange:#d97706; --orange-light:#fef3c7;
  --red:#dc2626; --red-light:#fee2e2;
  --teal:#0891b2; --teal-light:#cffafe;
  --pink:#db2777; --pink-light:#fce7f3;
  --indigo:#4338ca; --indigo-light:#e0e7ff;
  --slate:#475569; --bg:#f1f5f9;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#1e293b;min-height:100vh;}
button{cursor:pointer;font-family:inherit;transition:all .2s;}

#topbar{background:linear-gradient(120deg,var(--blue-dark),var(--blue));color:white;padding:10px 16px;position:sticky;top:0;z-index:200;box-shadow:0 3px 14px rgba(0,0,0,.28);}
#topbar-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tb-brand{font-weight:800;font-size:15px;}
.tb-sub{font-size:10px;opacity:.75;}
#session-tabs{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;}
.sess-btn{padding:6px 11px;border-radius:16px;border:none;font-size:11px;font-weight:700;background:rgba(255,255,255,.18);color:white;}
.sess-btn.active{background:white;color:var(--blue-dark);}
.sess-btn.locked{opacity:.45;}

#content-tabs{background:white;border-bottom:2px solid #e2e8f0;position:sticky;top:53px;z-index:190;}
#content-tabs-inner{max-width:960px;margin:0 auto;display:flex;gap:0;padding:0 16px;}
.ctab{padding:12px 18px;border:none;background:none;font-size:13px;font-weight:700;color:#94a3b8;border-bottom:3px solid transparent;margin-bottom:-2px;}
.ctab.active{color:var(--blue);border-bottom-color:var(--blue);}
.ctab-badge{display:inline-block;background:#e2e8f0;color:#64748b;border-radius:10px;font-size:10px;font-weight:800;padding:1px 6px;margin-left:5px;}
.ctab.active .ctab-badge{background:var(--blue-light);color:var(--blue);}

#main{max-width:960px;margin:0 auto;padding:20px 14px 100px;}

.sess-header{border-radius:18px;padding:20px 22px;margin-bottom:20px;border:1px solid;}
.sess-num{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;opacity:.85;}
.sess-title{font-size:20px;font-weight:900;margin-bottom:6px;}
.sess-desc{font-size:13px;opacity:.85;line-height:1.6;}
.sess-stats{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;}
.stat-chip{background:rgba(255,255,255,.35);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;}

.section-title{font-size:14px;font-weight:800;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:2px;background:#e2e8f0;border-radius:2px;}

.vocab-controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.vc-btn{padding:7px 14px;border-radius:20px;border:1px solid #e2e8f0;background:white;font-size:12px;font-weight:600;color:var(--slate);}
.vc-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue);}

.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.vcard{border-radius:12px;padding:14px 16px;border:2px solid;background:white;cursor:pointer;min-height:72px;display:flex;flex-direction:column;justify-content:center;position:relative;}
.vcard:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08);}
.vcard-num{position:absolute;top:8px;right:10px;font-size:10px;font-weight:700;color:#cbd5e1;}
.vcard-front{font-size:14px;font-weight:600;}
.vcard-back{font-size:14px;font-weight:600;display:none;}
.vcard-hint{font-size:11px;color:#94a3b8;margin-top:4px;}
.vcard.flipped .vcard-front{display:none;}
.vcard.flipped .vcard-back{display:block;}
.vcard.flipped .vcard-hint{display:none;}

.vocab-list-view{display:none;}
.vocab-row{display:flex;align-items:stretch;gap:0;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:7px;overflow:hidden;background:white;}
.vocab-row-num{background:var(--bg);display:flex;align-items:center;justify-content:center;padding:0 12px;font-size:11px;font-weight:700;color:#94a3b8;border-right:1px solid #e2e8f0;min-width:36px;}
.vocab-row-ru{flex:1;padding:11px 14px;font-size:13px;font-weight:600;border-right:1px solid #e2e8f0;}
.vocab-row-vi{flex:1;padding:11px 14px;font-size:13px;color:var(--slate);}

/* ── SRS QUIZ ── */
.srs-wrap{max-width:580px;margin:0 auto;}
.srs-topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.srs-progress-wrap{flex:1;min-width:120px;}
.srs-progress-label{font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px;display:flex;justify-content:space-between;}
.srs-bar-bg{background:#e2e8f0;border-radius:8px;height:8px;}
.srs-bar-fill{border-radius:8px;height:8px;transition:width .5s;}
.srs-dir-toggle{display:flex;gap:4px;}
.srs-dir-btn{padding:6px 12px;border-radius:16px;border:2px solid #e2e8f0;background:white;font-size:11px;font-weight:700;color:#64748b;}
.srs-dir-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue);}

.srs-card-wrap{margin-bottom:20px;}
.srs-card{
  background:white;border-radius:20px;border:3px solid #e2e8f0;
  padding:28px 24px;text-align:center;min-height:140px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.07);
  transition:border-color .35s,box-shadow .35s;position:relative;
}
.srs-card.correct-flash{border-color:#22c55e;box-shadow:0 4px 20px rgba(34,197,94,.25);}
.srs-card.wrong-flash{border-color:#ef4444;box-shadow:0 4px 20px rgba(239,68,68,.25);}
.srs-card-badge{position:absolute;top:12px;left:16px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;}
.srs-card-counter{position:absolute;top:12px;right:16px;font-size:11px;font-weight:700;color:#cbd5e1;}
.srs-card-word{font-size:20px;font-weight:800;line-height:1.4;color:#1e293b;}
.srs-card-hint{font-size:12px;color:#94a3b8;margin-top:10px;}

.srs-input-zone{margin-bottom:14px;}
.srs-input{
  width:100%;padding:13px 16px;border:2px solid #e2e8f0;border-radius:12px;
  font-size:14px;font-family:'Segoe UI',system-ui,sans-serif;
  background:#fafafa;color:#1e293b;transition:border-color .2s;text-align:center;
}
.srs-input:focus{outline:none;border-color:#93c5fd;background:white;box-shadow:0 0 0 3px #dbeafe44;}
.srs-input.locked{background:#f1f5f9;color:#64748b;}
.srs-input::placeholder{color:#cbd5e1;font-size:13px;}

.srs-btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.srs-submit-btn{padding:12px 28px;border-radius:12px;border:none;font-size:14px;font-weight:700;color:white;}
.srs-submit-btn:hover{opacity:.88;}
.srs-submit-btn:disabled{opacity:.35;cursor:not-allowed;}

.srs-answer-zone{display:none;}
.srs-answer-zone.show{display:block;animation:fadeIn .25s ease;}
.srs-correct-ans{background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:14px 18px;margin-bottom:14px;text-align:center;}
.srs-correct-ans-label{font-size:10px;font-weight:800;letter-spacing:1px;color:#15803d;margin-bottom:6px;text-transform:uppercase;}
.srs-correct-ans-text{font-size:16px;font-weight:700;color:#166534;line-height:1.5;}
.srs-judge-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.srs-btn-ok{padding:13px 28px;border-radius:12px;border:none;background:#22c55e;color:white;font-size:14px;font-weight:800;}
.srs-btn-ok:hover{background:#16a34a;}
.srs-btn-fail{padding:13px 28px;border-radius:12px;border:none;background:#ef4444;color:white;font-size:14px;font-weight:800;}
.srs-btn-fail:hover{background:#dc2626;}
.srs-btn-skip{padding:11px 16px;border-radius:12px;border:2px solid #e2e8f0;background:white;font-size:12px;font-weight:600;color:#64748b;}
.srs-btn-skip:hover{background:#f1f5f9;}

.srs-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:16px;}
.srs-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:background .3s;}
.srs-dot.mastered{background:#22c55e;}
.srs-dot.active{background:var(--blue);}
.srs-dot.retry{background:#f97316;}
.srs-dot.pending{background:#e2e8f0;}

.srs-finish{text-align:center;padding:40px 20px;animation:fadeIn .4s ease;}
.srs-finish-icon{font-size:60px;margin-bottom:14px;}
.srs-finish-title{font-size:22px;font-weight:900;margin-bottom:8px;}
.srs-finish-sub{font-size:14px;color:#64748b;line-height:1.7;margin-bottom:24px;}
.srs-restart-btn{padding:13px 28px;border-radius:12px;border:none;font-size:14px;font-weight:700;color:white;}
.srs-restart-btn:hover{opacity:.88;}

.struct-grid{display:grid;gap:10px;}
.struct-card{background:white;border-radius:14px;padding:16px;border:2px solid #e2e8f0;display:grid;grid-template-columns:36px 1fr;gap:0 14px;align-items:start;}
.struct-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;flex-shrink:0;margin-top:2px;}
.struct-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.struct-ru{font-size:14px;font-weight:700;margin-bottom:5px;font-family:'Courier New',monospace;}
.struct-vi{font-size:13px;color:var(--slate);margin-bottom:4px;}
.struct-ex{font-size:11px;background:#f8fafc;border-radius:6px;padding:5px 9px;color:#64748b;font-style:italic;margin-top:6px;line-height:1.6;}

.ex-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.ex-tab{padding:8px 18px;border-radius:20px;border:2px solid #e2e8f0;background:white;font-size:12px;font-weight:700;color:var(--slate);}
.ex-tab.active{border-color:var(--blue);background:var(--blue);color:white;}

.exercise-list{display:grid;gap:14px;}
.ex-card{background:white;border-radius:16px;border:2px solid #e2e8f0;overflow:hidden;}
.ex-card-header{padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #f1f5f9;}
.ex-card-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;}
.ex-card-dir{font-size:10px;font-weight:800;letter-spacing:1px;}
.ex-card-body{padding:16px 18px;}
.ex-source{font-size:14px;font-weight:600;line-height:1.8;margin-bottom:12px;padding:12px 14px;border-radius:10px;border-left:4px solid;}
.ex-points{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.ex-point{display:flex;gap:8px;font-size:13px;align-items:flex-start;}
.ex-point-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.ex-ans-btn{width:100%;padding:11px;border-radius:10px;border:2px dashed #cbd5e1;background:#f8fafc;font-size:13px;font-weight:600;color:#64748b;}
.ex-ans-btn:hover{background:#f1f5f9;border-color:#94a3b8;}
.ex-answer{display:none;margin-top:12px;}
.ex-answer.show{display:block;}
.ex-ans-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.ex-ans-text{font-size:13px;line-height:1.9;padding:12px 14px;border-radius:10px;margin-bottom:10px;background:#f0fdf4;border:2px solid #86efac;color:#166534;}
.ex-notes{background:#fefce8;border:2px solid #fde047;border-radius:10px;padding:12px 14px;}
.ex-notes-title{font-size:10px;font-weight:800;letter-spacing:1px;color:#713f12;margin-bottom:8px;}
.ex-note-item{display:flex;gap:6px;font-size:12px;color:#713f12;margin-bottom:6px;align-items:flex-start;line-height:1.5;}

/* ── USER INPUT AREA ── */
.user-input-wrap{margin-bottom:12px;}
.user-input-label{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#64748b;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.user-textarea{
  width:100%;min-height:100px;padding:12px 14px;
  border:2px solid #e2e8f0;border-radius:10px;
  font-size:13px;font-family:'Segoe UI',system-ui,sans-serif;
  line-height:1.7;resize:vertical;background:#fafafa;
  color:#1e293b;transition:border-color .2s;
}
.user-textarea:focus{outline:none;border-color:#93c5fd;background:white;box-shadow:0 0 0 3px #dbeafe55;}
.user-textarea.submitted{background:#f8fafc;color:#64748b;border-color:#e2e8f0;}
.user-textarea::placeholder{color:#cbd5e1;}
.submit-row{display:flex;gap:8px;margin-top:8px;align-items:center;}
.btn-submit{
  padding:10px 20px;border-radius:10px;border:none;
  font-size:13px;font-weight:700;color:white;
  flex-shrink:0;
}
.btn-submit:hover{opacity:.88;}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;}
.btn-edit{
  padding:10px 16px;border-radius:10px;border:2px solid #e2e8f0;
  background:white;font-size:12px;font-weight:600;color:#64748b;
  display:none;flex-shrink:0;
}
.btn-edit:hover{background:#f1f5f9;}
.submit-hint{font-size:11px;color:#94a3b8;font-style:italic;}
.user-ans-preview{
  background:#f0f9ff;border:2px solid #bae6fd;border-radius:10px;
  padding:11px 14px;margin-bottom:12px;display:none;
}
.user-ans-preview.show{display:block;}
.user-ans-preview-label{font-size:10px;font-weight:800;letter-spacing:1px;color:#0369a1;margin-bottom:6px;}
.user-ans-preview-text{font-size:13px;line-height:1.7;color:#1e3a5f;white-space:pre-wrap;}

#score-panel{position:fixed;bottom:20px;right:20px;background:white;border-radius:16px;padding:14px 18px;box-shadow:0 8px 24px rgba(0,0,0,.15);border:2px solid #e2e8f0;min-width:160px;z-index:300;}
.sp-title{font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:1px;margin-bottom:8px;}
.sp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:12px;}
.sp-val{font-weight:800;}
.progress-bar-wrap{background:#e2e8f0;border-radius:6px;height:6px;margin-bottom:4px;}
.progress-bar-fill{border-radius:6px;height:6px;transition:width .5s;}

.empty-state{text-align:center;padding:60px 20px;color:#94a3b8;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-msg{font-size:15px;font-weight:600;}
.empty-sub{font-size:13px;margin-top:6px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards;}

@media(max-width:600px){
  .vocab-grid{grid-template-columns:1fr;}
  .struct-card{grid-template-columns:1fr;}
  .struct-num{display:none;}
  #session-tabs{gap:3px;}
  .sess-btn{padding:5px 8px;font-size:10px;}
}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-inner">
    <div>
      <div class="tb-brand">🎓 Biên Dịch Cao Cấp Nga ↔ Việt</div>
      <div class="tb-sub">Ôn thi giữa kỳ · 8 Buổi học · Từ vựng · Cấu trúc · Bài dịch</div>
    </div>
    <div id="session-tabs"></div>
  </div>
</div>

<div id="content-tabs">
  <div id="content-tabs-inner">
    <button class="ctab active" onclick="switchCTab('vocab')">📝 Từ vựng <span class="ctab-badge" id="badge-vocab">0</span></button>
    <button class="ctab" onclick="switchCTab('struct')">🔧 Cấu trúc <span class="ctab-badge" id="badge-struct">0</span></button>
    <button class="ctab" onclick="switchCTab('trans')">✍️ Bài dịch <span class="ctab-badge" id="badge-trans">0</span></button>
  </div>
</div>

<div id="main">
  <div id="pane-vocab" class="pane fade-in"></div>
  <div id="pane-struct" class="pane fade-in" style="display:none;"></div>
  <div id="pane-trans" class="pane fade-in" style="display:none;"></div>
</div>

<div id="score-panel">
  <div class="sp-title">📊 TIẾN ĐỘ</div>
  <div class="sp-row"><span>🧠 SRS nắm được</span><span class="sp-val" id="sp-vocab">0/0</span></div>
  <div class="sp-row"><span>✍️ Bài đã nộp</span><span class="sp-val" id="sp-trans">0/0</span></div>
  <div style="margin-top:8px;">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="sp-bar" style="width:0%;background:var(--blue);"></div></div>
    <div style="font-size:10px;color:#94a3b8;text-align:right;" id="sp-pct">0%</div>
  </div>
</div>

<script>
// ================================================================
// SESSION DATA
// ================================================================
const SESS_COLORS = [
  {color:'#2563eb',bg:'#dbeafe',light:'#eff6ff'},
  {color:'#7c3aed',bg:'#ede9fe',light:'#f5f3ff'},
  {color:'#059669',bg:'#d1fae5',light:'#f0fdf4'},
  {color:'#d97706',bg:'#fef3c7',light:'#fffbeb'},
  {color:'#dc2626',bg:'#fee2e2',light:'#fff1f2'},
  {color:'#0891b2',bg:'#cffafe',light:'#ecfeff'},
  {color:'#db2777',bg:'#fce7f3',light:'#fdf4ff'},
  {color:'#4338ca',bg:'#e0e7ff',light:'#eef2ff'},
];

const SESSIONS = [

// ════════════════════════════════════════

// ════════════════════════════════════════
{
  title: "Kinh Tế Vĩ Mô: Tổng Quan",
  topic: "Макроэкономика — Обзор",
  desc: "Chủ đề: Các chỉ số kinh tế vĩ mô của Nga và Việt Nam. Đọc và dịch bản tin kinh tế từ nguồn Kremlin.ru, TASS, VGP. Kỳ thi kiểm tra khả năng dịch số liệu thống kê, nhận diện cấu trúc câu báo chí kinh tế.",

  vocab: [
    {ru:"Валовый внутренний продукт (ВВП)", vi:"Tổng sản phẩm quốc nội (GDP)"},
    {ru:"Темпы роста / темп роста", vi:"Tốc độ tăng trưởng"},

    {ru:"Дефляция", vi:"Giảm phát"},
    {ru:"Федеральный бюджет", vi:"Ngân sách liên bang"},
    {ru:"Государственный бюджет", vi:"Ngân sách nhà nước"},

    {ru:"Профицит бюджета", vi:"Thặng dư ngân sách"},
    {ru:"Дефицит бюджета", vi:"Thâm hụt ngân sách"},
    {ru:"Оборот розничной торговли", vi:"Tổng mức bán lẻ hàng hoá"},
    {ru:"Добавленная стоимость", vi:"Giá trị gia tăng"},
    {ru:"Потребительская активность", vi:"Hoạt động tiêu dùng"},
    {ru:"Продовольственная безопасность", vi:"An ninh lương thực"},
    {ru:"Реальный сектор экономики", vi:"Khu vực kinh tế thực"},
    {ru:"Первое / второе полугодие", vi:"Sáu tháng đầu năm / sáu tháng cuối năm"},
    {ru:"Аналогичный период прошлого года", vi:"Cùng kỳ năm ngoái"},
    {ru:"Прогноз / прогнозировать", vi:"Dự báo / dự báo (động từ)"},
    {ru:"Вклад в экономику", vi:"Đóng góp vào kinh tế"},
    {ru:"Рост / снижение показателя", vi:"Tăng / giảm chỉ số"},
    {ru:"Поставить рекорд / достичь рекорда", vi:"Lập / đạt kỷ lục"},
    {ru:"Экономическая стабильность", vi:"Sự ổn định kinh tế"},

// ================================================================
// STATE
// ================================================================



let currentSession = 0;
let currentCTab = 'vocab';
let flippedVocab = new Set();
let revealedExercises = new Set();

// SRS state per session
// srsState[idx] = { queue:[], intervals:{}, mastered:Set, direction:'rv', active:false }
const srsState = {};

// ================================================================
// INIT
// ================================================================
window.onload = () => {
  buildSessionTabs();
  loadSession(0);
};

function buildSessionTabs() {
  const c = document.getElementById('session-tabs');
  c.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const btn = document.createElement('button');
    btn.className = 'sess-btn' + (i===0?' active':'') + (!SESSIONS[i]?' locked':'');
    btn.textContent = 'B' + (i+1);
    btn.title = SESSIONS[i] ? SESSIONS[i].title : 'Chưa có nội dung';
    btn.onclick = () => loadSession(i);
    c.appendChild(btn);
  }
}

function loadSession(idx) {
  currentSession = idx;
  flippedVocab = new Set();
  revealedExercises = new Set();
  document.querySelectorAll('.sess-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const sess = SESSIONS[idx];
  if (!sess) { showEmpty(idx); return; }
  document.getElementById('badge-vocab').textContent = sess.vocab.length;
  document.getElementById('badge-struct').textContent = sess.structures.length;
  const tot = (sess.exercises_rv||[]).length + (sess.exercises_vr||[]).length;
  document.getElementById('badge-trans').textContent = tot;
  renderVocab(sess, idx);
  renderStruct(sess, idx);
  renderTrans(sess, idx);
  switchCTab(currentCTab);
  updateScore(sess);
}

function showEmpty(idx) {
  const html = `<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-msg">Buổi ${idx+1} chưa có nội dung</div><div class="empty-sub">Nội dung sẽ được cập nhật sớm!</div></div>`;
  ['vocab','struct','trans'].forEach(p => document.getElementById('pane-'+p).innerHTML = html);
  document.getElementById('badge-vocab').textContent='—';
  document.getElementById('badge-struct').textContent='—';
  document.getElementById('badge-trans').textContent='—';
  document.getElementById('sp-vocab').textContent='—';
  document.getElementById('sp-trans').textContent='—';
  document.getElementById('sp-bar').style.width='0%';
  document.getElementById('sp-pct').textContent='—';
  switchCTab(currentCTab);
}

// ── INTERACTIONS ──
function switchCTab(tab) {
  currentCTab = tab;
  ['vocab','struct','trans'].forEach(t => {
    document.getElementById('pane-'+t).style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.ctab').forEach((b,i) => b.classList.toggle('active', ['vocab','struct','trans'][i]===tab));
}

function switchEx(tab, idx) {
  ['rv','vr'].forEach(t => {
    const el = document.getElementById(`exp-${t}-${idx}`);
    if(el) el.style.display = t===tab?'grid':'none';
    const btn = document.getElementById(`extab-${t}`);
    if(btn) btn.classList.toggle('active', t===tab);
  });
}

function flipCard(idx, i) {
  const el = document.getElementById(`vc-${idx}-${i}`);
  const key = `${idx}-${i}`;
  if (flippedVocab.has(key)) {
    flippedVocab.delete(key);
    el.classList.remove('flipped');
    el.style.background = 'white';
  } else {
    flippedVocab.add(key);
    el.classList.add('flipped');
    el.style.background = SESS_COLORS[idx].bg;
  }
  updateScore(SESSIONS[currentSession]);
}

function flipAll(idx) {
  SESSIONS[idx].vocab.forEach((_,i) => {
    const el = document.getElementById(`vc-${idx}-${i}`);
    const key = `${idx}-${i}`;
    if (el) { flippedVocab.add(key); el.classList.add('flipped'); el.style.background=SESS_COLORS[idx].bg; }
  });
  updateScore(SESSIONS[currentSession]);
}

function resetFlip(idx) {
  SESSIONS[idx].vocab.forEach((_,i) => {
    const el = document.getElementById(`vc-${idx}-${i}`);
    const key = `${idx}-${i}`;
    if(el){ flippedVocab.delete(key); el.classList.remove('flipped'); el.style.background='white'; }
  });
  updateScore(SESSIONS[currentSession]);
}

function setView(mode, idx) {
  const cards = document.getElementById(`vc-cards-${idx}`);
  const list  = document.getElementById(`vc-list-${idx}`);
  const quiz  = document.getElementById(`vc-quiz-${idx}`);
  const btnC  = document.getElementById(`btn-cards-${idx}`);
  const btnL  = document.getElementById(`btn-list-${idx}`);
  const btnQ  = document.getElementById(`btn-quiz-${idx}`);
  if(cards) cards.style.display = mode==='cards' ? 'grid' : 'none';
  if(list)  list.style.display  = mode==='list'  ? 'block': 'none';
  if(quiz)  quiz.style.display  = mode==='quiz'  ? 'block': 'none';
  if(btnC) btnC.classList.toggle('active', mode==='cards');
  if(btnL) btnL.classList.toggle('active', mode==='list');
  if(btnQ) btnQ.classList.toggle('active', mode==='quiz');
  if(mode==='quiz') initSRS(idx);
}

// ════════════════════════════════════════
// SRS ENGINE
// ════════════════════════════════════════

function initSRS(idx) {
  const s = SESSIONS[idx];
  if (!s) return;
  if (!srsState[idx]) {
    srsState[idx] = {
      queue: s.vocab.map((_,i)=>i),   // card indices in queue
      intervals: {},                    // cardIdx -> correct streak count
      mastered: new Set(),             // indices fully mastered
      direction: 'rv',                 // 'rv' = Nga→Việt, 'vr' = Việt→Nga
      answered: false,
      totalCards: s.vocab.length,
    };
    s.vocab.forEach((_,i) => { srsState[idx].intervals[i] = 0; });
  }
  renderSRSCard(idx);
}

function srsSetDir(idx, dir) {
  if (!srsState[idx]) return;
  srsState[idx].direction = dir;
  srsState[idx].answered = false;
  renderSRSCard(idx);
}

function renderSRSCard(idx) {
  const st = srsState[idx];
  const C = SESS_COLORS[idx];
  const container = document.getElementById(`srs-content-${idx}`);
  if (!container) return;

  const totalCards = st.totalCards;
  const masteredCount = st.mastered.size;

  // All mastered → finish screen
  if (st.queue.length === 0) {
    container.innerHTML = `
    <div class="srs-finish">
      <div class="srs-finish-icon">🏆</div>
      <div class="srs-finish-title" style="color:${C.color};">Hoàn thành! Bạn đã thuộc tất cả ${totalCards} từ!</div>
      <div class="srs-finish-sub">
        Tuyệt vời 🎉 Bạn đã vượt qua toàn bộ vòng ôn tập lặp lại ngắt quãng.<br>
        Hãy thử lại để củng cố thêm, hoặc chuyển sang buổi tiếp theo!
      </div>
      <button class="srs-restart-btn" style="background:${C.color};" onclick="restartSRS(${idx})">🔄 Ôn lại từ đầu</button>
    </div>`;
    updateScore(SESSIONS[currentSession]);
    return;
  }

  const cardIdx = st.queue[0];
  const vocab = SESSIONS[idx].vocab[cardIdx];
  const isRV = st.direction === 'rv';
  const front = isRV ? vocab.ru : vocab.vi;
  const back  = isRV ? vocab.vi : vocab.ru;
  const frontFlag = isRV ? '🇷🇺 Tiếng Nga' : '🇻🇳 Tiếng Việt';
  const backLabel = isRV ? 'Dịch sang tiếng Việt:' : 'Dịch sang tiếng Nga:';
  const placeholder = isRV ? 'Gõ nghĩa tiếng Việt...' : 'Введите перевод на русский...';
  const queuePos = st.queue.length;

  // Build dot indicators (max 30 dots)
  const dotHtml = SESSIONS[idx].vocab.map((_,i) => {
    let cls = 'pending';
    if (st.mastered.has(i)) cls = 'mastered';
    else if (i === cardIdx) cls = 'active';
    else if (st.queue.indexOf(i) > 0 && st.intervals[i] === -1) cls = 'retry';
    return `<div class="srs-dot ${cls}" title="${SESSIONS[idx].vocab[i].ru}"></div>`;
  }).join('');

  container.innerHTML = `
  <!-- Direction toggle + progress -->
  <div class="srs-topbar">
    <div class="srs-progress-wrap">
      <div class="srs-progress-label">
        <span>🧠 Đã nắm: <strong>${masteredCount}/${totalCards}</strong></span>
        <span>Còn lại: ${queuePos}</span>
      </div>
      <div class="srs-bar-bg"><div class="srs-bar-fill" style="width:${Math.round(masteredCount/totalCards*100)}%;background:${C.color};"></div></div>
    </div>
    <div class="srs-dir-toggle">
      <button class="srs-dir-btn ${st.direction==='rv'?'active':''}" onclick="srsSetDir(${idx},'rv')">🇷🇺→🇻🇳</button>
      <button class="srs-dir-btn ${st.direction==='vr'?'active':''}" onclick="srsSetDir(${idx},'vr')">🇻🇳→🇷🇺</button>
    </div>
  </div>

  <!-- Card -->
  <div class="srs-card-wrap">
    <div class="srs-card" id="srs-card-${idx}" style="border-color:${C.color}33;">
      <div class="srs-card-badge">${frontFlag}</div>
      <div class="srs-card-counter">${cardIdx+1}/${totalCards}</div>
      <div class="srs-card-word">${esc(front)}</div>
      <div class="srs-card-hint">${backLabel}</div>
    </div>
  </div>

  <!-- Input -->
  <div class="srs-input-zone">
    <input
      class="srs-input" id="srs-inp-${idx}"
      placeholder="${placeholder}"
      oninput="srsOnType(${idx})"
      onkeydown="if(event.key==='Enter'&&!this.disabled)srsSubmit(${idx})"
      autocomplete="off" autocorrect="off" spellcheck="false"
    />
  </div>

  <!-- Submit row -->
  <div class="srs-btn-row" id="srs-btn-row-${idx}">
    <button class="srs-submit-btn" id="srs-submit-${idx}"
      style="background:${C.color};" onclick="srsSubmit(${idx})" disabled>
      ✅ Kiểm tra
    </button>
    <button class="srs-btn-skip" onclick="srsSkip(${idx})">⏭ Bỏ qua</button>
  </div>

  <!-- Answer reveal zone -->
  <div class="srs-answer-zone" id="srs-ans-${idx}">
    <div class="srs-correct-ans">
      <div class="srs-correct-ans-label">✅ Đáp án đúng</div>
      <div class="srs-correct-ans-text">${esc(back)}</div>
    </div>
    <div class="srs-judge-row">
      <button class="srs-btn-ok" onclick="srsJudge(${idx},true)">✅ Nhớ rồi!</button>
      <button class="srs-btn-fail" onclick="srsJudge(${idx},false)">❌ Chưa nhớ</button>
    </div>
  </div>

  <!-- Progress dots -->
  <div class="srs-dots">${dotHtml}</div>`;

  // Auto-focus input
  setTimeout(()=>{ const inp=document.getElementById(`srs-inp-${idx}`); if(inp) inp.focus(); }, 80);
}

function srsOnType(idx) {
  const inp = document.getElementById(`srs-inp-${idx}`);
  const btn = document.getElementById(`srs-submit-${idx}`);
  if(!inp || !btn) return;
  btn.disabled = inp.value.trim().length < 1;
}

function srsSubmit(idx) {
  const inp = document.getElementById(`srs-inp-${idx}`);
  const ansZone = document.getElementById(`srs-ans-${idx}`);
  const btnRow = document.getElementById(`srs-btn-row-${idx}`);
  if(!inp || inp.value.trim().length < 1) return;
  inp.disabled = true;
  inp.classList.add('locked');
  if(btnRow) btnRow.style.display = 'none';
  if(ansZone) ansZone.classList.add('show');
}

function srsSkip(idx) {
  // Treat skip as wrong — push to back of queue
  srsJudge(idx, false);
}

function srsJudge(idx, correct) {
  const st = srsState[idx];
  const cardIdx = st.queue.shift(); // remove from front

  if(correct) {
    st.intervals[cardIdx] = (st.intervals[cardIdx]||0) + 1;
    const interval = st.intervals[cardIdx];
    if(interval >= 2) {
      // Mastered after 2 consecutive correct answers
      st.mastered.add(cardIdx);
    } else {
      // Push back by (interval × 3) positions, minimum at position 3
      const pushBack = Math.min(Math.max(interval * 3, 3), st.queue.length);
      st.queue.splice(pushBack, 0, cardIdx);
    }
    // Flash green
    const card = document.getElementById(`srs-card-${idx}`);
    if(card){ card.classList.add('correct-flash'); setTimeout(()=>card.classList.remove('correct-flash'),500); }
  } else {
    st.intervals[cardIdx] = 0;
    // Push back to position 2 (repeat soon)
    const pushBack = Math.min(2, st.queue.length);
    st.queue.splice(pushBack, 0, cardIdx);
    // Flash red
    const card = document.getElementById(`srs-card-${idx}`);
    if(card){ card.classList.add('wrong-flash'); setTimeout(()=>card.classList.remove('wrong-flash'),500); }
  }

  updateScore(SESSIONS[currentSession]);
  setTimeout(()=>renderSRSCard(idx), 350);
}

function restartSRS(idx) {
  const s = SESSIONS[idx];
  if(!s) return;
  srsState[idx] = {
    queue: s.vocab.map((_,i)=>i),
    intervals: {},
    mastered: new Set(),
    direction: srsState[idx]?.direction || 'rv',
    answered: false,
    totalCards: s.vocab.length,
  };
  s.vocab.forEach((_,i) => { srsState[idx].intervals[i] = 0; });
  renderSRSCard(idx);
}

function onUserType(key) {
  const ta = document.getElementById('ta-'+key);
  const btn = document.getElementById('btnsubmit-'+key);
  const hint = document.getElementById('hint-'+key);
  if (!ta || !btn) return;
  const hasText = ta.value.trim().length > 5;
  btn.disabled = !hasText;
  if (hint) hint.style.display = hasText ? 'none' : 'inline';
}

function submitAns(key, color) {
  const ta = document.getElementById('ta-'+key);
  const btnSubmit = document.getElementById('btnsubmit-'+key);
  const btnEdit   = document.getElementById('btnedit-'+key);
  const preview   = document.getElementById('preview-'+key);
  const previewTxt= document.getElementById('preview-text-'+key);
  const ans       = document.getElementById('exans-'+key);
  const hint      = document.getElementById('hint-'+key);
  if (!ta || !ta.value.trim()) return;

  // Lock textarea
  ta.classList.add('submitted');
  ta.readOnly = true;

  // Show user's answer preview
  if (preview && previewTxt) {
    previewTxt.textContent = ta.value.trim();
    preview.classList.add('show');
  }

  // Show official answer + notes
  if (ans) ans.classList.add('show');

  // Swap buttons
  if (btnSubmit) btnSubmit.style.display = 'none';
  if (btnEdit)   btnEdit.style.display   = 'inline-block';
  if (hint)      hint.style.display      = 'none';

  // Track progress
  revealedExercises.add(key);
  updateScore(SESSIONS[currentSession]);
}

function editAns(key) {
  const ta        = document.getElementById('ta-'+key);
  const btnSubmit = document.getElementById('btnsubmit-'+key);
  const btnEdit   = document.getElementById('btnedit-'+key);
  const preview   = document.getElementById('preview-'+key);
  const ans       = document.getElementById('exans-'+key);
  const hint      = document.getElementById('hint-'+key);

  // Unlock textarea
  if (ta) { ta.classList.remove('submitted'); ta.readOnly = false; ta.focus(); }

  // Hide preview & answer
  if (preview) preview.classList.remove('show');
  if (ans)     ans.classList.remove('show');

  // Swap buttons back
  if (btnSubmit) { btnSubmit.style.display='inline-block'; btnSubmit.disabled=false; }
  if (btnEdit)   btnEdit.style.display = 'none';
  if (hint)      hint.style.display    = 'none';

  // Remove from tracked (so score updates)
  revealedExercises.delete(key);
  updateScore(SESSIONS[currentSession]);
}

function updateScore(sess) {
  if(!sess) return;
  const vT = sess.vocab.length;
  // Count SRS mastered for current session
  const vD = srsState[currentSession] ? srsState[currentSession].mastered.size : 0;
  const eT = (sess.exercises_rv||[]).length+(sess.exercises_vr||[]).length;
  const eD = [...revealedExercises].filter(k=>k.startsWith(currentSession+'-')).length;
  const pct = Math.round(vD/Math.max(vT,1)*50 + eD/Math.max(eT,1)*50);
  document.getElementById('sp-vocab').textContent=vD+'/'+vT;
  document.getElementById('sp-trans').textContent=eD+'/'+eT;
  document.getElementById('sp-bar').style.width=pct+'%';
  document.getElementById('sp-pct').textContent=pct+'%';
}

function esc(str) {
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
</script>
